name: Docker Hub Push

on:
  push:
    branches: [ "main" ] # Kodunu 'main' branch'ine push ettiğinde çalışır

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Flight Service
      - name: Build and Push Flight Service
        uses: docker/build-push-action@v5
        with:
          context: ./flight-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flight-service:latest

      # 2. Booking Service
      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: ./booking-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/booking-service:latest

      # 3. Gateway Service
      - name: Build and Push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      # 4. Eureka Server
      - name: Build and Push Eureka Server
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest